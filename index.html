<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaurav Tour & Travel - Your Journey, Our Passion</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            line-height: 1.6;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            background: rgba(0, 0, 0, 0.95);
            padding: 10px 0;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon {
            font-size: 28px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        .logo-text span {
            color: #f0a500;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #ddd;
            font-weight: 500;
            transition: color 0.3s;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .nav-links a:hover {
            color: #f0a500;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger span {
            width: 28px;
            height: 3px;
            background: #fff;
            border-radius: 3px;
            transition: all 0.3s;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 6px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -6px);
        }

        /* ===== HERO SECTION ===== */
        .hero {
            height: 100vh;
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4)),
                        linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #533483 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            animation: moveBackground 20s linear infinite;
        }

        @keyframes moveBackground {
            0% { transform: translateX(0) translateY(0); }
            100% { transform: translateX(-60px) translateY(-60px); }
        }

        .hero-particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(240, 165, 0, 0.6);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; animation-duration: 8s; }
        .particle:nth-child(2) { left: 20%; top: 80%; animation-delay: 1s; animation-duration: 6s; }
        .particle:nth-child(3) { left: 40%; top: 40%; animation-delay: 2s; animation-duration: 7s; }
        .particle:nth-child(4) { left: 60%; top: 60%; animation-delay: 3s; animation-duration: 9s; }
        .particle:nth-child(5) { left: 80%; top: 30%; animation-delay: 4s; animation-duration: 5s; }
        .particle:nth-child(6) { left: 70%; top: 70%; animation-delay: 2.5s; animation-duration: 8s; }
        .particle:nth-child(7) { left: 90%; top: 50%; animation-delay: 1.5s; animation-duration: 7s; }
        .particle:nth-child(8) { left: 30%; top: 10%; animation-delay: 3.5s; animation-duration: 6s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-30px) scale(1.5); opacity: 1; }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 0 20px;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(240, 165, 0, 0.2);
            border: 1px solid rgba(240, 165, 0, 0.5);
            color: #f0a500;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            animation: fadeInDown 1s ease;
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
            animation: fadeInUp 1s ease 0.3s both;
        }

        .hero h1 span {
            background: linear-gradient(135deg, #f0a500, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 35px;
            opacity: 0.9;
            animation: fadeInUp 1s ease 0.6s both;
        }

        .hero-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 1s ease 0.9s both;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f0a500, #ff6b35);
            color: #fff;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(240, 165, 0, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(240, 165, 0, 0.5);
        }

        .btn-secondary {
            background: transparent;
            color: #fff;
            padding: 15px 35px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            transform: translateY(-3px);
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 60px;
            animation: fadeInUp 1s ease 1.2s both;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: #f0a500;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== SEARCH BAR ===== */
        .search-section {
            max-width: 1000px;
            margin: -60px auto 0;
            position: relative;
            z-index: 10;
            padding: 0 20px;
        }

        .search-bar {
            background: #fff;
            border-radius: 20px;
            padding: 30px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 20px;
            align-items: end;
        }

        .search-group {
            display: flex;
            flex-direction: column;
        }

        .search-group label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 8px;
        }

        .search-group input,
        .search-group select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
            outline: none;
        }

        .search-group input:focus,
        .search-group select:focus {
            border-color: #f0a500;
        }

        .search-btn {
            background: linear-gradient(135deg, #f0a500, #ff6b35);
            color: #fff;
            padding: 14px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(240, 165, 0, 0.4);
        }

        /* ===== SECTION STYLES ===== */
        .section {
            padding: 100px 20px;
        }

        .section-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-tag {
            color: #f0a500;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .section-title {
            font-size: 42px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 15px;
        }

        .section-subtitle {
            font-size: 18px;
            color: #666;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ===== SERVICES SECTION ===== */
        .services {
            background: #f8f9fa;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .service-card {
            background: #fff;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid #f0f0f0;
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(135deg, #f0a500, #ff6b35);
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .service-card:hover::before {
            transform: scaleX(1);
        }

        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .service-icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .service-card h3 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 12px;
        }

        .service-card p {
            color: #666;
            font-size: 15px;
        }

        /* ===== DESTINATIONS SECTION ===== */
        .destinations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .destination-card {
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            height: 400px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .destination-card:hover {
            transform: translateY(-10px);
        }

        .destination-bg {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.5s;
        }

        .destination-card:hover .destination-bg {
            transform: scale(1.1);
        }

        .destination-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            color: #fff;
        }

        .destination-overlay h3 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .destination-overlay .location {
            opacity: 0.8;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .destination-price {
            display: inline-block;
            background: linear-gradient(135deg, #f0a500, #ff6b35);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .destination-rating {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .dest1 .destination-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .dest2 .destination-bg { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .dest3 .destination-bg { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .dest4 .destination-bg { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .dest5 .destination-bg { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .dest6 .destination-bg { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }

        .dest-icon {
            font-size: 80px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -70%);
            opacity: 0.3;
        }

        /* ===== PACKAGES SECTION ===== */
        .packages {
            background: #f8f9fa;
        }

        .packages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .package-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.08);
            transition: all 0.3s;
        }

        .package-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .package-header {
            padding: 30px;
            color: #fff;
            position: relative;
        }

        .package-card:nth-child(1) .package-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .package-card:nth-child(2) .package-header {
            background: linear-gradient(135deg, #f0a500, #ff6b35);
        }

        .package-card:nth-child(3) .package-header {
            background: linear-gradient(135deg, #11998e, #38ef7d);
        }

        .package-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .package-header h3 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .package-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .package-price {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
        }

        .package-price .amount {
            font-size: 28px;
            font-weight: 700;
        }

        .package-price .per {
            font-size: 12px;
            opacity: 0.8;
        }

        .package-body {
            padding: 30px;
        }

        .package-features {
            list-style: none;
            margin-bottom: 25px;
        }

        .package-features li {
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #555;
            font-size: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .package-features li:last-child {
            border-bottom: none;
        }

        .check-icon {
            color: #38ef7d;
            font-weight: bold;
        }

        .package-btn {
            width: 100%;
            padding: 14px;
            border: 2px solid #f0a500;
            background: transparent;
            color: #f0a500;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .package-btn:hover {
            background: #f0a500;
            color: #fff;
        }

        /* ===== WHY CHOOSE US ===== */
        .why-us-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
        }

        .why-card {
            text-align: center;
            padding: 20px;
        }

        .why-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(240, 165, 0, 0.1), rgba(255, 107, 53, 0.1));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 20px;
        }

        .why-card h3 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .why-card p {
            color: #666;
            font-size: 15px;
        }

        /* ===== TESTIMONIALS ===== */
        .testimonials {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
        }

        .testimonials .section-title {
            color: #fff;
        }

        .testimonials .section-subtitle {
            color: rgba(255, 255, 255, 0.7);
        }
